# ONE-IL production reverse proxy (nginx)
#
# Place inside your server {} block. Adjust upstream ports and server_name.

server {
	listen 443 ssl http2;
	server_name app.example.com;

	# SCR + audit logs — one-il gateway (canonical)
	location /change-requests {
		proxy_pass http://127.0.0.1:3000;
		include proxy_params;
	}

	location /admin/audit-logs {
		proxy_pass http://127.0.0.1:3000;
		include proxy_params;
	}

	# one-leave sub-app (strip /leave prefix)
	location /leave/ {
		proxy_pass http://127.0.0.1:3001/;
		include proxy_params;
	}

	# one-il gateway default
	location / {
		proxy_pass http://127.0.0.1:3000;
		include proxy_params;
	}
}
